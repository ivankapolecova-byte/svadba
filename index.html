<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svadobná galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

h2 {
  padding: 15px;
  margin: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 4px;
}

.grid img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 10px;
}

/* viewer */
#viewer {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  align-items: center;
  justify-content: center;
}

#viewer img {
  width: 100%;
  max-height: 90vh;
  object-fit: contain;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  color: white;
  font-size: 24px;
}
</style>
</head>

<body>

<h2>📷 Svadobná galéria</h2>

<div class="grid" id="grid"></div>

<div id="viewer">
  <div class="close" onclick="closeViewer()">✖</div>
  <img id="imgView">
</div>

<script>
const CLOUD_NAME = "da3roufa0";

let images = [];
let index = 0;

const grid = document.getElementById("grid");
const viewer = document.getElementById("viewer");
const imgView = document.getElementById("imgView");

// 🔥 NAJSTABILNEJŠÍ CLOUDINARY REQUEST (TAG BASED)
function loadImages() {

  fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/svadba.json`)
    .then(r => r.json())
    .then(data => {

      images = data.resources.map(img =>
        `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}`
      );

      render();
    })
    .catch(() => {
      grid.innerHTML = "Nepodarilo sa načítať fotky.";
    });
}

// 📱 GRID
function render() {
  grid.innerHTML = "";

  images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => open(i);
    grid.appendChild(img);
  });
}

// 👀 OPEN
function open(i) {
  index = i;
  viewer.style.display = "flex";
  imgView.src = images[index];
}

function closeViewer() {
  viewer.style.display = "none";
}

// 👉 swipe
let startX = 0;

viewer.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) next();
  if (endX - startX > 50) prev();
});

function next() {
  if (index < images.length - 1) {
    index++;
    imgView.src = images[index];
  }
}

function prev() {
  if (index > 0) {
    index--;
    imgView.src = images[index];
  }
}

loadImages();
</script>

</body>
</html>
