<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svadba galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

h2 {
  margin: 10px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 4px;
}

.grid img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

/* fullscreen */
#viewer {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  align-items: center;
  justify-content: center;
}

#viewer img {
  width: 100%;
  max-height: 90vh;
  object-fit: contain;
}
</style>
</head>

<body>

<h2>📷 Svadobná galéria</h2>

<!-- 3 TLAČIDLÁ -->
<button onclick="camera.click()">📸 Odfoť a pošli</button>
<button onclick="gallery.click()">🖼 Nahraj z galérie</button>
<button onclick="loadGallery()">👀 Pozri si fotky hostí</button>

<!-- hidden inputy -->
<input id="camera" type="file" accept="image/*" capture="environment" hidden>
<input id="gallery" type="file" accept="image/*" hidden>

<!-- lokálny preview (len po nahraní) -->
<div class="grid" id="local"></div>

<!-- galéria hostí (zobrazí sa až po kliknutí) -->
<div class="grid" id="cloud"></div>

<!-- fullscreen viewer -->
<div id="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<script>
const CLOUD_NAME = "da3roufa0";
const UPLOAD_PRESET = "svadba";

const camera = document.getElementById("camera");
const gallery = document.getElementById("gallery");
const local = document.getElementById("local");
const cloud = document.getElementById("cloud");

const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

// 📤 upload do Cloudinary
async function upload(file) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: form }
  );

  const data = await res.json();

  if (!data.secure_url) {
    alert("Upload zlyhal!");
    return null;
  }

  return data.secure_url;
}

// 📸 spracovanie fotky
async function handle(file) {
  const url = await upload(file);
  if (!url) return;

  // uložíme URL do Firebase
  await fetch("https://svadba-gallery-default-rtdb.europe-west1.firebasedatabase.app/photos.json", {
    method: "POST",
    body: JSON.stringify({
      url: url,
      time: Date.now()
    })
  });
}

// inputy
camera.onchange = e => handle(e.target.files[0]);
gallery.onchange = e => handle(e.target.files[0]);

// 🖼 lokálny preview
function showLocal(files) {
  for (let f of files) {
    const r = new FileReader();
    r.onload = e => {
      const img = document.createElement("img");
      img.src = e.target.result;
      local.appendChild(img);
    };
    r.readAsDataURL(f);
  }
}

camera.addEventListener("change", e => showLocal(e.target.files));
gallery.addEventListener("change", e => showLocal(e.target.files));


// 👀 GALÉRIA (zobrazí sa LEN po kliknutí)
async function loadGallery() {
  cloud.innerHTML = "Načítavam...";

  const res = await fetch(
    "https://svadba-gallery-default-rtdb.europe-west1.firebasedatabase.app/photos.json"
  );

  const data = await res.json();

  cloud.innerHTML = "";

  if (!data) {
    cloud.innerHTML = "Zatiaľ žiadne fotky";
    return;
  }

  Object.values(data).reverse().forEach(photo => {
    const img = document.createElement("img");
    img.src = photo.url;

    img.onclick = () => {
      viewer.style.display = "flex";
      viewerImg.src = photo.url;
    };

    cloud.appendChild(img);
  });
}
</script>

</body>
</html>
