<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viki & Peťo</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    width:100%;
    max-width:400px;
}

button{
    width:100%;
    padding:18px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#status{
    margin-top:20px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

    <button onclick="openCamera()">
        Odfoť sa a pošli 📸
    </button>

    <button onclick="openGallery()">
        Nahraj fotku z galérie 🖼️
    </button>

    <div id="status"></div>

</div>

<input
    type="file"
    id="cameraInput"
    accept="image/*"
    capture="environment"
    style="display:none"
>

<input
    type="file"
    id="galleryInput"
    accept="image/*"
    style="display:none"
>

<script>

const cameraInput = document.getElementById("cameraInput");
const galleryInput = document.getElementById("galleryInput");
const statusDiv = document.getElementById("status");

function openCamera(){
    cameraInput.click();
}

function openGallery(){
    galleryInput.click();
}

cameraInput.addEventListener("change", function(){
    if(this.files.length){
        uploadFile(this.files[0]);
    }
});

galleryInput.addEventListener("change", function(){
    if(this.files.length){
        uploadFile(this.files[0]);
    }
});

function uploadFile(file){

    statusDiv.innerHTML = "Nahrávam...";

    const formData = new FormData();

    formData.append("file", file);
    formData.append("upload_preset", "svadba_viktoria_peter");

    fetch(
        "https://api.cloudinary.com/v1_1/da3roufa0/image/upload",
        {
            method:"POST",
            body:formData
        }
    )
    .then(response => response.json())
    .then(data => {

        if(data.secure_url){

            statusDiv.innerHTML =
            "Fotka bola úspešne odoslaná ❤️";

        }else{

            statusDiv.innerHTML =
            "Chyba pri nahrávaní.";

            console.log(data);
        }

    })
    .catch(error => {

        statusDiv.innerHTML =
        "Chyba pripojenia.";

        console.log(error);

    });
}

</script>

</body>
</html>
