<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svadobná live galéria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 4px;
}

.grid img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

#viewer {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  align-items: center;
  justify-content: center;
}

#viewer img {
  width: 100%;
  max-height: 90vh;
  object-fit: contain;
}
</style>
</head>

<body>

<h2>📷 Svadobná galéria LIVE</h2>

<button onclick="camera.click()">📸 Odfoť a pošli</button>
<button onclick="gallery.click()">🖼 Nahraj fotku</button>

<input id="camera" type="file" accept="image/*" capture="environment" hidden>
<input id="gallery" type="file" accept="image/*" hidden>

<div class="grid" id="grid"></div>

<div id="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "TVOJ_FIREBASE_URL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const grid = document.getElementById("grid");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

const CLOUD = "da3roufa0";

// 📤 upload do Cloudinary
async function upload(file) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", "svadba");

  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, {
    method: "POST",
    body: form
  });

  const data = await res.json();
  return data.secure_url;
}

// 📸 kamera / galéria
async function handle(file) {
  const url = await upload(file);

  push(ref(db, "photos"), {
    url: url,
    time: Date.now()
  });
}

// inputy
camera.onchange = e => handle(e.target.files[0]);
gallery.onchange = e => handle(e.target.files[0]);

// 👀 LIVE LISTENER
onValue(ref(db, "photos"), (snapshot) => {
  grid.innerHTML = "";

  const data = snapshot.val();

  if (!data) return;

  Object.values(data)
    .reverse()
    .forEach(photo => {
      const img = document.createElement("img");
      img.src = photo.url;

      img.onclick = () => {
        viewer.style.display = "flex";
        viewerImg.src = photo.url;
      };

      grid.appendChild(img);
    });
});
</script>

</body>
</html>
