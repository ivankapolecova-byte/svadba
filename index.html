<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svadobná galéria</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #111;
  color: white;
}

h2 {
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 8px;
}

.camera {
  background: #4caf50;
  color: white;
}

.galleryBtn {
  background: #2196f3;
  color: white;
}

.cloudBtn {
  background: #ff9800;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-top: 15px;
}

.grid img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

#cloudGallery {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>📷 Svadobná galéria</h2>

<!-- TLAČIDLÁ -->
<button class="camera" onclick="openCamera()">📸 Odfoť a pošli</button>
<button class="galleryBtn" onclick="openGallery()">🖼 Nahraj z galérie</button>
<button class="cloudBtn" onclick="loadCloudGallery()">👀 Pozrieť fotky hostí</button>

<!-- INPUTY -->
<input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
<input id="galleryInput" type="file" accept="image/*" multiple hidden>

<!-- LOKÁLNE PREVIEW -->
<div class="grid" id="preview"></div>

<!-- CLOUDINARY GALÉRIA -->
<div id="cloudGallery">
  <h3>Svadobné fotky hostí</h3>
  <div class="grid" id="cloudGrid"></div>
</div>

<script>
const cameraInput = document.getElementById("cameraInput");
const galleryInput = document.getElementById("galleryInput");
const preview = document.getElementById("preview");

// otvorenie kamery
function openCamera() {
  cameraInput.click();
}

// otvorenie galérie
function openGallery() {
  galleryInput.click();
}

// zobrazenie lokálnych fotiek
function showImages(files) {
  for (let file of files) {
    const reader = new FileReader();

    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      preview.appendChild(img);
    };

    reader.readAsDataURL(file);
  }
}

cameraInput.addEventListener("change", e => {
  showImages(e.target.files);
});

galleryInput.addEventListener("change", e => {
  showImages(e.target.files);
});

// ===== CLOUDINARY GALÉRIA =====
function loadCloudGallery() {
  const CLOUD_NAME = "da3roufa0";
  const FOLDER = "svadba";

  const cloudGallery = document.getElementById("cloudGallery");
  const cloudGrid = document.getElementById("cloudGrid");

  cloudGallery.style.display = "block";
  cloudGrid.innerHTML = "Načítavam fotky...";

  fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`)
    .then(res => res.json())
    .then(data => {
      cloudGrid.innerHTML = "";

      data.resources.forEach(img => {
        const el = document.createElement("img");
        el.src = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${FOLDER}/${img.public_id}.jpg`;
        cloudGrid.appendChild(el);
      });
    })
    .catch(() => {
      cloudGrid.innerHTML = "Nepodarilo sa načítať fotky.";
    });
}
</script>

</body>
</html>
