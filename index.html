<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svadba upload</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  background: white;
  font-family: Arial;
}

button {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: black;
  color: white;
}
</style>
</head>

<body>

<!-- 2 TLAČIDLÁ -->
<button onclick="camera.click()">📸 Odfoť sa a pošli</button>
<button onclick="gallery.click()">🖼 Nahraj fotku</button>

<!-- INPUTY -->
<input id="camera" type="file" accept="image/*" capture="environment" hidden>
<input id="gallery" type="file" accept="image/*" hidden>

<script>
const CLOUD_NAME = "da3roufa0";
const UPLOAD_PRESET = "svadba";

const camera = document.getElementById("camera");
const gallery = document.getElementById("gallery");

// 🔥 upload do Cloudinary
async function upload(file) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: form }
  );

  const data = await res.json();

  if (!data.secure_url) {
    alert("Upload zlyhal");
    console.log(data);
    return;
  }

  alert("Fotka odoslaná 👍");
}

// 📸 kamera
camera.onchange = e => {
  const file = e.target.files[0];
  if (file) upload(file);
};

// 🖼 galéria
gallery.onchange = e => {
  const file = e.target.files[0];
  if (file) upload(file);
};
</script>

</body>
</html>
